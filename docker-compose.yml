services:
  postgres:
    image: postgres:16
    container_name: aivoa-crm-postgres
    environment:
      POSTGRES_DB: aivoa_crm
      POSTGRES_USER: crm
      POSTGRES_PASSWORD: crm
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
